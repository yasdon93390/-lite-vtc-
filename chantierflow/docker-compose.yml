services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chantierflow
      POSTGRES_USER: chantierflow
      POSTGRES_PASSWORD: chantierflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://chantierflow:chantierflow@db:5432/chantierflow
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - ./storage:/app/storage

volumes:
  pgdata:
